name: CI Pipeline

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

jobs:
  reference-build:
    uses: ./.github/workflows/workflows.yml
    with:
      action: build

  reference-test:
    uses: ./.github/workflows/workflows.yml
    with:
      action: test

  reference-deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      env: production
