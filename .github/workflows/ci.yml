  name: CI Pipeline

  on:
    push:
      branches: [master]

    pull_request:
      branches: [master]

  jobs:
    steps:
    - build:
        uses: ./.github/workflows/workflows.yml
        with:
          action: build

    - test:
      uses: ./.github/workflows/workflows.yml
      with:
        action: test

    - deploy:
      uses: ./.github/workflows/deploy.yml
      with:
        env: production
